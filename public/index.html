<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, shrink-to-fit=no"
		/>
		<title>Browser | USER09363</title>

	
		<script src="/scram/scramjet.all.js"></script>
		<script src="/baremux/index.js"></script>
		
		<link rel="stylesheet" href="index.css" />
		<script src="register-sw.js" defer></script>
		<script src="search.js" defer></script>
		<script src="index.js" defer></script>
	</head>

	<body class="browser-container">
		<!-- Browser Header -->
		<div class="browser-header">
			<!-- Tab Bar -->
			<div class="tab-bar">
				<div class="tab active" data-tab="0">
					<span class="tab-icon">🌐</span>
					<span class="tab-title">New Tab</span>
					<button class="tab-close">×</button>
				</div>
				<button class="tab-add">+</button>
				<span class="user-badge-tab">USER09363</span>
			</div>

			<!-- Toolbar -->
			<div class="toolbar">
				<div class="toolbar-buttons">
					<button class="toolbar-btn" title="Back">←</button>
					<button class="toolbar-btn" title="Forward">→</button>
					<button class="toolbar-btn" title="Reload">⟳</button>
					<button class="toolbar-btn" title="Home">⌂</button>
				</div>

				<!-- Address Bar -->
				<form id="sj-form" class="address-bar-container">
					<input
						id="sj-search-engine"
						value="https://www.google.com/search?q=%s"
						type="hidden"
					/>
					<input 
						id="sj-address" 
						type="text" 
						placeholder="Search or enter URL"
						class="address-bar"
					/>
				</form>

				<div class="toolbar-buttons">
					<button class="toolbar-btn" title="Settings">⋮</button>
				</div>
			</div>
		</div>
		
			<!-- Browser Content Area -->
		<div class="browser-content">
			<!-- Tab Content -->
			<div class="tab-content active" data-tab="0">
				<!-- iFrame Container (watermark / wallpaper sits behind) -->
				<div id="iframe-container">
					<video class="browser-wallpaper" src="ps3.mp4" autoplay loop muted playsinline></video>
				</div>
			</div>
		</div>


		<!-- Error Display -->
		<div class="error-container">
			<p id="sj-error"></p>
			<pre id="sj-error-code"></pre>
		</div>
	</body>
</html>
